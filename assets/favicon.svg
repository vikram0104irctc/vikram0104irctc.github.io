<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark purple background -->
  <rect width="64" height="64" rx="14" fill="#0f0b1a"/>
  <!-- Subtle inner glow ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#ringGrad)" stroke-width="1.5"/>
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- "VK" text centered -->
  <text
    x="32" y="43"
    text-anchor="middle"
    font-family="'Segoe UI', 'Inter', -apple-system, sans-serif"
    font-size="28"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#textGrad)">VK</text>
  <!-- Small dot accent -->
  <circle cx="53" cy="16" r="3.5" fill="#a855f7" opacity="0.9"/>
</svg>
